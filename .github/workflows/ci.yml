name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Show Swift version
        run: swift --version
      - name: Resolve dependencies
        run: swift package resolve
      - name: Build
        run: swift build -v
      - name: Test
        run: swift test -v
